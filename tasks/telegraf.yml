---
# yamllint disable rule:line-length
- name: Adds GPG package
  ansible.builtin.apt:
    name: gnupg
    state: present

- name: Ensure keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
    owner: root
    group: root

- name: Download influxdata GPG key
  ansible.builtin.get_url:
    url: https://repos.influxdata.com/influxdata-archive.key
    dest: /tmp/influxdata-archive.key
    mode: "0644"
  register: _influxdata_key

- name: Verify and install influxdata GPG key
  ansible.builtin.shell:
    cmd: |
      gpg --show-keys --with-fingerprint --with-colons /tmp/influxdata-archive.key 2>&1 \
      | grep -q '^fpr:\+24C975CBA61A024EE1B631787C3D57159FC2F927:$' \
      && gpg --dearmor < /tmp/influxdata-archive.key > /etc/apt/keyrings/influxdata-archive.gpg
  when: _influxdata_key.changed

- name: Ensure influxdata GPG key has correct permissions
  ansible.builtin.file:
    path: /etc/apt/keyrings/influxdata-archive.gpg
    mode: "0644"
    owner: root
    group: root

- name: Installs apt-transport-https
  apt:
    pkg: apt-transport-https
    state: present

- name: Remove old influxdb repository file
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/repos_influxdata_com_debian.list
    state: absent

- name: Adds influxdb repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/influxdata-archive.gpg] https://repos.influxdata.com/debian stable main"
    state: present
    filename: influxdata
    update_cache: true

- name: Installs smartmontools
  apt:
    pkg: smartmontools
    state: present
  tags:
    - telegraf:smart
    - smart
  when: '"smart" in telegraf_inputs'

- name: Installs telegraf
  apt:
    pkg: telegraf
    state: present

- name: Installs latest telegraf if required
  apt:
    pkg: telegraf
    state: latest
    update_cache: true
  when: telegraf_install_latest

- name: Adds telegraf config
  template:
    src: telegraf.conf.j2
    dest: /etc/telegraf/telegraf.conf
    mode: 0640
    owner: telegraf
    group: telegraf
  tags:
    - telegraf:config
    - config
  notify: Restart telegraf

- name: Adds input plugins configs
  template:
    src: input.generic.conf.j2
    dest: "/etc/telegraf/telegraf.d/{{ item.key }}.conf"
    mode: 0640
    owner: telegraf
    group: telegraf
  loop: "{{ telegraf_inputs | dict2items | rejectattr('key', 'search', 'ping') | list}}"
  tags:
    - telegraf:config
    - config
  notify: Restart telegraf

- name: Adds processors plugins configs
  template:
    src: topk.processor.conf.j2
    dest: "/etc/telegraf/telegraf.d/topk.conf"
    mode: 0640
    owner: telegraf
    group: telegraf
  when: "'topk' in telegraf_processors"
  tags:
    - telegraf:config
    - config
  notify: Restart telegraf

- name: Adds regex plugin config
  template:
    src: regex.processor.conf.j2
    dest: "/etc/telegraf/telegraf.d/regex.conf"
    mode: 0640
    owner: telegraf
    group: telegraf
  when: "'regex' in telegraf_processors"
  tags:
    - telegraf:config
    - config
  notify: Restart telegraf

# We ignore errrors here since haproxy & docker might be installed affter
# telegraf
- name: Add telegraf user in required groups when needed
  user:
    name: telegraf
    groups: "{{ item }}"
    append: true
  ignore_errors: true
  when: item in telegraf_inputs
  loop:
    - "docker"
    - "haproxy"
  tags:
    - telegraf:config
    - config
  notify: Restart telegraf

- name: Adds sudoers config to allow telegraf to collect stats
  template:
    src: 30-telegraf-sudoers.j2
    dest: /etc/sudoers.d/30_{{ item.key }}
    mode: 0440
    owner: root
    group: root
  when: item.key in telegraf_inputs
  tags:
    - telegraf:sudo
    - sudo
  loop: "{{ telegraf_sudoers | dict2items }}"
  notify: Restart telegraf

# Adds facl for postfix if required
- name: Adds specific ACLs for postfix if needed
  acl:
    path: "{{ telegraf_inputs.postfix.queue_directory | default('/var/spool/postfix/') }}/{{ item }}"
    entity: telegraf
    etype: user
    permissions: rX
    state: present
    recursive: true
  when: '"postfix" in telegraf_inputs'
  tags: "telegraf:config"
  loop:
    - active
    - deferred
    - hold
    - incoming
    - maildrop


